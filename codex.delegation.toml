# Codex/agent delegation policy for VersaEnergy.
#
# This is a repo-local operating contract, not a runtime feature flag.
# If the platform cannot switch models automatically, follow the same routing
# manually with minimum context.

[models]
architect = "gpt-5.5"
reviewer = "gpt-5.5"
senior_worker = "gpt-5.4"
standard_worker = "gpt-5.4-mini"
fast_worker = "gpt-5.3-codex-spark"
coding_worker = "gpt-5.3-codex"

[provider_model_classes]
frontier_reasoning = [
  "openai:gpt-5.5-or-latest-frontier-reasoning",
  "anthropic:claude-opus-4.7-or-latest-opus",
  "deepseek:latest-high-reasoning-model"
]
strong_coding = [
  "openai:gpt-coding-or-mini-high",
  "anthropic:claude-sonnet-class",
  "deepseek:coder-or-chat-strong"
]
cheap_utility = [
  "openai:mini-small-or-fast",
  "anthropic:haiku-class",
  "deepseek:small-or-fast-chat"
]

[routing]
natural_language_intake = "architect"
requirements_clarification = "architect"
architecture = "architect"
graph_semantics = "architect"
unit_conversion_or_balance_logic = "architect"
schema_rls_auth = "architect"
topology_versioning = "architect"
final_review = "reviewer"
codebase_exploration = "fast_worker"
docs_summarization = "fast_worker"
context_packet_building = "fast_worker"
focused_frontend_change = "standard_worker"
focused_service_change = "coding_worker"
mechanical_refactor = "standard_worker"
verification_checklist = "fast_worker"

[guardrails]
main_model_must_read_agents = true
main_model_must_convert_natural_language_to_brief = true
main_model_must_review_high_risk_diff = true
workers_must_have_bounded_scope = true
workers_must_not_touch_env_files = true
workers_must_not_use_runtime_mocks = true
workers_must_report_files_changed = true
workers_must_report_tests_run = true

[escalation]
escalate_to_top_on_schema_rls_auth = true
escalate_to_top_on_graph_semantics = true
escalate_to_top_on_unit_conversion = true
escalate_to_top_on_balance_logic = true
escalate_to_top_on_published_version_rules = true
escalate_to_top_on_iso_evidence = true
escalate_to_top_on_ambiguous_product_behavior = true

[workflow]
phase_1 = "top model converts natural-language request into a technical brief"
phase_2 = "top model reads AGENTS.md and the relevant docs/fase-NN.md"
phase_3 = "cheap worker explores bounded docs/files when useful"
phase_4 = "coding worker implements clear contained changes"
phase_5 = "cheap worker verifies checklist/build when useful"
phase_6 = "top model reviews high-risk changes and final risks"
